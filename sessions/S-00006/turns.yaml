      content: |-
        Role: Act as a Principal Golang Architect and CLI Product Owner.
        Objective: Refactor the adb CLI to reduce cognitive load, enforce Semantic Versioning, and ensure 100% test coverage on critical paths.

        Context: The current CLI has "command sprawl" (30+ commands). We need to unify these into a noun-verb structure and hide internal plumbing.

        Execution Plan - Perform in Order:

        PHASE 1: Semantic Versioning & Discovery

        Check State: Run git fetch --tags. Identify the latest Semantic Version tag (e.g., v1.2.3).

        Determine Next Version:

        If we make breaking CLI changes (renaming commands), target Major (v2.0.0) or Minor (v1.3.0) depending on backward compatibility.

        Set this target version in a variable for the final build/tag step.

        PHASE 2: Architecture Refactoring (The Great Unification)

        Refactor Command Structure: Consolidate the CLI into the following hierarchy. Deprecate old commands with a "moved" warning.

        adb task:

        create <type> (Replaces: bug, feat, spike, refactor)

        lifecycle (Replaces: archive, unarchive, resume, cleanup)

        adb sync:

        Flags: --user, --context, --repos, --all (Replaces: sync-* commands)

        adb internal:

        hook (Replaces: hook, worktree-hook, worktree-lifecycle). Hide these from main help.

        Hooks Redesign: Replace the current recursive/blocking hook system with a Linear Middleware Chain.

        Requirement: Ensure hooks (pre/post-execution) share a context but cannot block indefinitely or trigger infinite loops.

        PHASE 3: Deep Research & QA (Table-Driven)

        Analysis: Scan main.go and cmd/ for flag inconsistencies. Ensure all new unified commands accept standardized flags (e.g., --json, --verbose).

        Test Matrix: Generate a Table-Driven Test suite that covers:

        Happy Paths: adb task create --type=bug "Fix login"

        Edge Cases: Invalid task types, network timeouts during sync, missing git repos.

        Flag Permutations: Test every combination of flags for the new adb sync command.

        Fixes: Auto-correct any error handling gaps found during test generation.

        PHASE 4: Git Operations

        git merge origin/main (Abort if conflicts detected).

        Run the full test suite.

        git commit -am "refactor: unify CLI commands and simplify hooks middleware"

        git tag -a [TARGET_VERSION] -m "Release: Simplified CLI structure"

        git push origin [TARGET_VERSION]

        git push
