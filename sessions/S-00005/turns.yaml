        Implement the following plan:

        # Plan: Deep Audit, Hooks Simplification, Full Test Coverage, and Cleanup

        ## Context

        This is a multi-phase audit and refactoring of the `adb` CLI tool. The codebase is in good shape (all tests pass, `go vet` clean) but has specific gaps:

        - **CLI test coverage at 40.8%** (12+ commands with zero test files)
        - **2 formatting issues** (`aicontext_test.go`, `knowledge_test.go`)
        - **golangci-lint cannot run** (built with Go 1.25, project targets 1.26 -- needs upgrade)
        - **Hooks system** is well-designed but can benefit from minor clarity improvements
        - **`DocTemplates` type** is exported but only used internally
        - **Variable naming** in `hookengine.go` uses `parts` twice in same function scope

        Current coverage: core 92.3%, storage 92.5%, integration 90.4%, hooks 87.6%, observability 86.9%, cli **40.8%**

        ## Phase 1: Code Analysis Fixes & Cleanup

        ### 1A. Fix formatting issues
        - `gofmt -s -w internal/core/aicontext_test.go`
        - `gofmt -s -w internal/core/knowledge_test.go`

        ### 1B. Unexport `DocTemplates` type
        - **File:** `internal/core/doctemplates.go:14`
        - Rename `DocTemplates` to `docTemplates`, `NewDocTemplates` to `newDocTemplates`
        - Update sole consumer in `internal/core/projectinit.go`
        - All methods stay exported (they're called via the struct value)

        ### 1C. Rename shadowed `parts` variable in hookengine.go
        - **File:** `internal/core/hookengine.go:221,235`
        - Rename first `parts` (line 221) to `testParts`, second (line 235) to `lintParts`
        - Improves readability, eliminates shadowing concern

        ### 1D. Upgrade golangci-lint
        - Run `go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest`
        - Verify `golangci-lint run` passes clean

        ### 1E. Add GoDoc comments for any missing exports
        - Audit found all exported types/functions already have GoDoc -- verify during implementation
        - Add any that are missing

        ## Phase 2: Comprehensive CLI Test Coverage (Table-Driven)

        This is the largest phase. For each untested CLI command, create a test file following the established pattern from `status_test.go`:
        1. Mock interface with function fields
        2. Save/restore package-level variable
        3. Table-driven subtests covering: nil dependency, happy path, error paths, edge cases

        ### Test files to create:

        **2A. `internal/cli/metrics_test.go`** (~150 lines)
        Test matrix for `metricsCmd`:
        | Scenario | MetricsCalc | --since | --json | Expected |
        |----------|-------------|---------|--------|----------|
        | nil calculator | nil | - | - | error: "not initialized" |
        | invalid --since format | mock | "abc" | false | error: "unsupported duration" |
        | invalid day format | mock | "xd" | false | error: "invalid day duration" |
        | invalid hour format | mock | "yh" | false | error: "invalid hour duration" |
        | empty --since (default 7d) | mock | "" | false | success, table output |
        | valid 30d | mock | "30d" | false | success |
        | valid 24h | mock | "24h" | false | success |
        | json output | mock | "7d" | true | success, JSON |
        | calculate error | mock(err) | "7d" | false | error: "calculating metrics" |

        Also test `parseSinceDuration` directly (exported for testing).

        **2B. `internal/cli/alerts_test.go`** (~120 lines)
        Test matrix for `alertsCmd`:
        | Scenario | AlertEngine | --notify | Notifier | Expected |
        |----------|-------------|----------|----------|----------|
        | nil engine | nil | false | - | error: "not initialized" |
        | no alerts | mock(empty) | false | - | "No active alerts" |
        | alerts found | mock(2 alerts) | false | - | prints alerts |
        | evaluate error | mock(err) | false | - | error: "evaluating alerts" |
        | notify without notifier | mock(alerts) | true | nil | error: "notifier not configured" |
        | notify success | mock(alerts) | true | mock | "Notifications sent" |
        | notify error | mock(alerts) | true | mock(err) | error: "sending notifications" |

        **2C. `internal/cli/cleanup_test.go`** (~100 lines)
        Test matrix for `cleanupCmd`:
        | Scenario | TaskMgr | Task state | Expected |
        |----------|---------|------------|----------|
        | nil task manager | nil | - | error: "not initialized" |
        | task not found | mock(err) | - | error: "cleaning up worktree" |
        | no worktree | mock(task.WorktreePath="") | - | "no worktree to clean up" |
        | cleanup success | mock(task+cleanup) | has worktree | "Worktree removed" |
        | cleanup error | mock(task+err) | has worktree | error |

        **2D. `internal/cli/exec_test.go`** (~130 lines)
        Test matrix for `execCmd`:
        | Scenario | Executor | Args | Expected |
        |----------|----------|------|----------|
        | nil executor | nil | ["foo"] | error: "not initialized" |
        | no args (list aliases) | mock(empty) | [] | "No CLI aliases" |
        | no args (has aliases) | mock(aliases) | [] | lists aliases |
        | exec success | mock(exit 0) | ["git","status"] | success |
        | exec error | mock(err) | ["bad"] | error: "exec bad" |
        | --help flag | any | ["--help"] | help output |
        | --simple flag | mock | ["--simple","git"] | sets env, calls exec |

        **2E. `internal/cli/run_test.go`** (~140 lines)
        Test matrix for `runCmd`:
        | Scenario | Runner | Args | Expected |
        |----------|--------|------|----------|
        | nil runner | nil | ["test"] | error: "not initialized" |
        | no args | mock | [] | error: "task name required" |
        | --list empty | mock(empty) | ["--list"] | "No tasks found" |
        | --list with tasks | mock(tasks) | ["--list"] | lists tasks |
        | -l shorthand | mock(tasks) | ["-l"] | lists tasks |
        | run success | mock(exit 0) | ["test"] | success |
        | run error | mock(err) | ["test"] | error: "run test" |
        | --help flag | any | ["--help"] | help output |
        | --simple flag | mock | ["--simple","test"] | sets env, calls run |

        **2F. `internal/cli/hook_pretooluse_test.go`** (~80 lines)
        Test matrix:
        | Scenario | HookEngine | Stdin | Expected |
        |----------|------------|-------|----------|
        | nil engine | nil | any | exit 0 |
        | empty stdin | mock | "" | exit 0 |
        | valid input, passes | mock(nil) | valid JSON | exit 0 |
        | valid input, blocks | mock(err) | valid JSON | exit 2 |

        **2G. `internal/cli/hook_posttooluse_test.go`** (~60 lines)
        Same pattern, always exit 0 (non-blocking).

        **2H. `internal/cli/hook_stop_test.go`** (~60 lines)
        Same pattern, always exit 0 (non-blocking).

        **2I. `internal/cli/hook_taskcompleted_test.go`** (~80 lines)
        Test matrix: nil engine, empty stdin, passes, Phase A blocks.

        **2J. `internal/cli/hook_sessionend_test.go`** (~60 lines)
        Same pattern, always exit 0 (non-blocking).

        **2K. `internal/cli/migratearchive_test.go`** (~100 lines)
        Test matrix:
        | Scenario | TaskMgr | --dry-run | Expected |
        |----------|---------|-----------|----------|
        | nil task manager | nil | false | error |
        | no archived tasks | mock(empty) | false | "No tasks" |
        | dry run | mock(tasks) | true | preview output |
        | migrate success | mock(tasks) | false | moves tasks |

        ### Test file for parseSinceDuration (unit function):
        Already in `metrics_test.go` -- add dedicated table-driven subtests.

        ## Phase 3: Hooks System Clarification

        The hooks system architecture is sound (explored thoroughly). No structural refactoring needed. Changes:

        ### 3A. Rename `parts` variables (done in 1C)

        ### 3B. Add test for `resolveTicketPath` helper
        - **File:** `internal/core/hookengine_test.go`
        - Test with: ADB_TASK_ID set/unset, ticket exists in active/archived/neither

        ### 3C. Add property tests for hook CLI commands
        - **File:** `internal/cli/hook_property_test.go` (~80 lines)
        - Property: For ANY valid PreToolUseInput JSON, parsing never panics
        - Property: For ANY PostToolUse input, exit code is always 0
        - Property: HookEngine nil always means exit 0 (graceful degradation)

        ## Phase 4: Lint Fixes & Verification

        ### 4A. Fix any issues found by golangci-lint after upgrade
        ### 4B. Run full test suite: `go test ./... -race -count=1`
        ### 4C. Run coverage report and verify CLI coverage improved significantly
        ### 4D. Verify `go vet ./...` still clean

        ## Phase 5: Git Operations (Sequential)

        1. `git fetch origin`
        2. `git merge origin/main` (stop if conflicts)
        3. Run full test suite one final time
        4. Commit with descriptive message
        5. Push
        6. Ask user for version number, then tag

        ## Files to Create
        - `internal/cli/metrics_test.go`
        - `internal/cli/alerts_test.go`
        - `internal/cli/cleanup_test.go`
        - `internal/cli/exec_test.go`
        - `internal/cli/run_test.go`
        - `internal/cli/hook_pretooluse_test.go`
        - `internal/cli/hook_posttooluse_test.go`
        - `internal/cli/hook_stop_test.go`
        - `internal/cli/hook_taskcompleted_test.go`
        - `internal/cli/hook_sessionend_test.go`
        - `internal/cli/migratearchive_test.go`
        - `internal/cli/hook_property_test.go`

        ## Files to Modify
        - `internal/core/doctemplates.go` (unexport DocTemplates)
        - `internal/core/projectinit.go` (update consumer of DocTemplates)
        - `internal/core/hookengine.go` (rename parts → testParts/lintParts)
        - `internal/core/hookengine_test.go` (add resolveTicketPath tests)
        - `internal/core/aicontext_test.go` (gofmt fix)
        - `internal/core/knowledge_test.go` (gofmt fix)

        ## Verification
        1. `gofmt -l .` returns empty (no formatting issues)
        2. `go vet ./...` passes clean
        3. `go test ./... -race -count=1` all pass
        4. `go test ./... -cover` shows CLI coverage > 65%
        5. `golangci-lint run` passes (after upgrade)
        6. Total coverage summary printed at end


