      content: |-
        Role: Act as a Principal Golang Architect and QA Lead. Your goal is to perform a rigorous audit, refactor, and full test coverage expansion of the current repository, specifically focusing on the adb implementation.

        Context: This is a mission-critical CLI tool. We need to eliminate technical debt, ensure deterministic behavior for all flags/commands, and simplify the architectural complexity of the "Hooks" system.

        Instructions - Execute in the following order:

        PHASE 1: Deep Code Analysis & Architecture Review

        Audit: Scan the entire codebase for dead code, variable shadowing, logical ambiguity, and undocumented exported functions.

        Hooks System Review: Analyze the hook implementation. Identify recursion risks, blocking mechanisms, and cognitive complexity. Propose and implement a simplified mental model (e.g., converting complex nested hooks into a linear middleware chain or event bus).

        Documentation: Generate GoDoc comments for all public interfaces where missing.

        PHASE 2: Comprehensive Testing (Table-Driven)

        Strategy: Adopt a Table-Driven Test approach. Create a test matrix that covers ALL combinations of:

        Commands (adb, etc.)

        Arguments (valid, invalid, boundary values)

        Flags/Switches (boolean, strings, int ranges)

        Scenarios: specifically test edge cases, including network timeouts, malformed inputs, and concurrent execution.

        Validation: Ensure every error path is captured, wrapped with context, and handled gracefully.

        PHASE 3: Execution & Refactoring

        Fix: Auto-fix all identified linting errors and logic bugs found in Phase 1.

        Unit & Integration: Generate and run the new test suite.

        Verification: Verify that the "Hooks" refactor passes all regression tests.

        PHASE 4: Git Operations (Sequential)

        Pre-requisite: Ensure the working directory is clean before starting.

        Fetch origin and identify the merge base with main.

        git merge origin/main (Stop and prompt me if conflicts arise).

        Run the full test suite one last time.

        git commit -am "refactor: optimize hooks, full test coverage, and cleanup"

        git push

        git tag -a vX.Y.Z -m "Release with comprehensive test suite" (Ask me for the version number before tagging).

        Constraints:

        Use standard Go idioms (Effective Go).

        Do not hallucinate external dependencies; prefer standard library where possible.

        Output the test coverage report summary at the end.
